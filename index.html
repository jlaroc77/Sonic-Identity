<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sonic Identity — Jeremy Larochelle</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box}body{margin:0}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    .ob:hover{border-color:#c8860a!important;color:#e8d5b0!important;background:#1c0a00!important}
    .mb:hover{opacity:.85;transform:scale(1.02)}
    input:focus{border-color:#c8860a!important;outline:none}
    ::placeholder{color:#3a2008}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#060200}
    ::-webkit-scrollbar-thumb{background:#2a1208}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState}=React;
const IMG={heroBg:"IMG_1889.png",vinylRecord:"IMG_1890.png",waveformDivider:"IMG_1891.png",resultBg:"IMG_1892.png",headerBg:"IMG_1893.jpeg"};
const GM={classicrock:{archetype:"The Titan",genre:"Classic Rock / Arena Rock",energy:"High Energy",vibe:"Powerful & Commanding",instruments:"Electric guitar, bass, drums, anthemic keys",artists:["Led Zeppelin","Journey","Queen","Heart"],brandSignal:"Anthemic, layered, timeless — earned through years not trends"},indierock:{archetype:"The Outlier",genre:"Psychedelic Indie Rock",energy:"Mid Energy",vibe:"Cool & Hypnotic",instruments:"Crunchy guitars, emotive vocals, psychedelic layers, warm synths",artists:["Tame Impala","Jungle","MGMT","Khruangbin"],brandSignal:"Counterculture tastemakers — hip, cool, breaks from the pack"},funksoul:{archetype:"The Truth Teller",genre:"Classic Funk & Soul",energy:"Mid-High Energy",vibe:"Groove-Driven & Soulful",instruments:"Horn sections, Hammond organ, live drums, gritty vocals",artists:["James Brown","Aretha Franklin","Bruno Mars","CHIC"],brandSignal:"Vintage cool, street credibility, hard-earned truth — authenticity that cannot be faked"},rnb:{archetype:"The Seduction",genre:"Modern R&B",energy:"Low-Mid Energy",vibe:"Intimate & Smooth",instruments:"Layered vocals, soft bass, intimate production, atmospheric synths",artists:["Frank Ocean","SZA","Amber Mark","Franc Moody"],brandSignal:"Sexy, sophisticated, magnetic — draws people in rather than pushing energy out"},hiphop:{archetype:"The Empire Builder",genre:"Hip-Hop",energy:"Mid-High Energy",vibe:"Confident & Driving",instruments:"808 bass, crisp snares, sampled soul, commanding vocals",artists:["Kendrick Lamar","Jay-Z","Salt-N-Pepa","Beastie Boys"],brandSignal:"Street credibility, urban, path-forging, rule-bending — unapologetic and culturally connected"},festival:{archetype:"The Rush",genre:"Electronic / Techno / Dubstep / Drum & Bass",energy:"Maximum Energy",vibe:"Euphoric & Relentless",instruments:"Synthesizers, heavy bass drops, driving kick drums, epic builds",artists:["NERVO","Anyma","Knife Party","Above & Beyond"],brandSignal:"Energized, unstoppable, better together — the feeling right before the drop"},island:{archetype:"The Escape",genre:"Tropical House / Downtempo House / Amapiano / Jazz House",energy:"Low Energy",vibe:"Breezy & Unhurried",instruments:"Steel drums, tropical percussion, soulful vocals, warm synths",artists:["Kygo","Kungs","Duke Dumont","Sigala"],brandSignal:"Sunny, breezy, soulful, unhurried — salt air and sea breeze"},pop:{archetype:"The Secret to Youth",genre:"Pop",energy:"High Energy",vibe:"Bright & Infectious",instruments:"Bright synths, punchy drums, hooky melodies, polished production",artists:["Sabrina Carpenter","Spice Girls","Harry Styles","Justin Bieber"],brandSignal:"Youth-forward, inclusive, irresistibly likable — wants everyone at the party"},latin:{archetype:"The Cultural Rhythm",genre:"Latin (Reggaeton / Bachata / Latin Pop)",energy:"High Energy",vibe:"Passionate & Celebratory",instruments:"Percussion, brass, Latin guitar, passionate vocals",artists:["Karol G","Nicky Jam","Elvis Crespo","Juanes"],brandSignal:"Culturally committed, Spanish-language first — celebration and cultural pride"},jazz:{archetype:"The Cool Sophistication",genre:"Jazz",energy:"Low-Mid Energy",vibe:"Sophisticated & Effortless",instruments:"Upright bass, brushed drums, piano, saxophone, trumpet",artists:["John Coltrane","Miles Davis","Diana Krall","Chick Corea"],brandSignal:"Vintage, sophisticated, effortlessly cool — exists outside the mainstream by choice"},classical:{archetype:"The Grand Presence",genre:"Classical / Orchestral",energy:"Varied",vibe:"Commanding & Timeless",instruments:"Full orchestra, strings, piano, sweeping compositions",artists:["Beethoven","Mozart","Tchaikovsky","Gershwin"],brandSignal:"Mastery, history, unquestionable class — timeless excellence as a birthright"},country:{archetype:"The Backbone",genre:"Country",energy:"Mid Energy",vibe:"Honest & Grounded",instruments:"Acoustic and electric guitar, fiddle, steel guitar, honest vocals",artists:["Johnny Cash","Brooks & Dunn","Toby Keith","Taylor Swift"],brandSignal:"Values-driven, hardworking, rooted, real — earned everything through hard work and truth"}};
const PM={legacy:"rich, layered, full production — nothing feels rushed or cheap",disruptor:"raw edges, unconventional structure, breaks expected patterns",connector:"warm, accessible, nothing alienates",seducer:"intimate, close-mic'd, pulls you in rather than pushing out",warrior:"driving, relentless, builds and earns every moment"};
const AM={tastemaker:"sound signals arrival, elevation, exclusivity and discovery — always ahead of the curve",loyalist:"sound signals consistency and trust",experiencer:"sound signals a moment worth having",believer:"sound signals values and meaning"};
const EM={relaxed:"slower tempos, resolution, no tension — the brand is a sanctuary",motivated:"builds toward a peak, forward momentum — the brand is a catalyst",connected:"communal feel, call and response, inclusive — the brand is a community",celebratory:"high energy, major keys, infectious — the brand is an event",aspired:"sophisticated, restrained, confident — the brand is a milestone"};
const DM={defines:"sonic logo, brand bible, campaign sound architecture",space:"BGM curation, dayparting, venue atmosphere",activation:"activation music, behavioral triggers, foot traffic drivers"};
const SM={established:"This brand knows exactly who it is. The profile confirms and refines an existing sonic identity.",building:"This brand is growing into its potential. The profile sets a north star to move toward.",pivot:"This brand is ready for a new sonic chapter. A deeper strategic conversation with Jeremy Larochelle is recommended before sound decisions are finalized."};
const QUESTIONS=[{id:1,question:"What best describes your brand's personality?",options:[{label:"The Legacy",value:"legacy",sub:"Confident, iconic, already arrived"},{label:"The Disruptor",value:"disruptor",sub:"Rules are suggestions — carves its own path"},{label:"The Connector",value:"connector",sub:"Warm, inclusive, wants everyone at the table"},{label:"The Seducer",value:"seducer",sub:"Sophisticated, magnetic, draws people in"},{label:"The Warrior",value:"warrior",sub:"Tough, driven, earns everything through effort"}]},{id:2,question:"Who is your core audience?",options:[{label:"The Tastemaker",value:"tastemaker",sub:"Discovers first, arrives early, always moving toward what's next"},{label:"The Loyalist",value:"loyalist",sub:"Values trust, consistency, and heritage"},{label:"The Experiencer",value:"experiencer",sub:"Lives for moments — buys feelings not products"},{label:"The Believer",value:"believer",sub:"Values-driven — the brand has to stand for something"}]},{id:3,question:"What feeling should your sound trigger?",options:[{label:"Relaxed & Safe",value:"relaxed",sub:"The brand is a sanctuary"},{label:"Motivated & Empowered",value:"motivated",sub:"The brand is a catalyst"},{label:"Connected & Engaged",value:"connected",sub:"The brand is a community"},{label:"Celebratory & Excited",value:"celebratory",sub:"The brand is an event"},{label:"Aspired to & Achieved",value:"aspired",sub:"The brand is a milestone"}]},{id:4,question:"How does music move your brand?",options:[{label:"It Defines Us",value:"defines",sub:"Sound as identity — tells people who we are"},{label:"It Sets Our Space",value:"space",sub:"Sound as atmosphere — makes the room feel like something"},{label:"It Moves People Through Our Doors",value:"activation",sub:"Sound as activation — drives behavior and foot traffic"}]},{id:5,question:"Which sonic world fits your brand?",options:[{label:"Classic Rock",value:"classicrock",sub:"Led Zeppelin, Journey, Queen, Heart"},{label:"Indie Rock",value:"indierock",sub:"Tame Impala, Jungle, MGMT, Khruangbin"},{label:"Classic Funk & Soul",value:"funksoul",sub:"James Brown, Aretha Franklin, Bruno Mars, CHIC"},{label:"Modern R&B",value:"rnb",sub:"Frank Ocean, SZA, Amber Mark, Franc Moody"},{label:"Hip-Hop",value:"hiphop",sub:"Kendrick Lamar, Jay-Z, Salt-N-Pepa, Beastie Boys"},{label:"Dance & Festival Energy",value:"festival",sub:"NERVO, Anyma, Knife Party, Above & Beyond"},{label:"Island Vibes",value:"island",sub:"Kygo, Kungs, Duke Dumont, Sigala"},{label:"Pop",value:"pop",sub:"Sabrina Carpenter, Harry Styles, Justin Bieber, Spice Girls"},{label:"Latin",value:"latin",sub:"Karol G, Nicky Jam, Elvis Crespo, Juanes"},{label:"Jazz",value:"jazz",sub:"Coltrane, Miles Davis, Diana Krall, Chick Corea"},{label:"Classical",value:"classical",sub:"Beethoven, Mozart, Tchaikovsky, Gershwin"},{label:"Country",value:"country",sub:"Johnny Cash, Brooks & Dunn, Toby Keith, Taylor Swift"}]},{id:6,question:"Where is your brand right now?",options:[{label:"Established & Confident",value:"established",sub:"We know who we are — the sound needs to reflect that"},{label:"Building & Ambitious",value:"building",sub:"We're growing into who we're becoming"},{label:"Ready to Pivot",value:"pivot",sub:"We have equity but we're ready for a new sonic chapter"}]}];

async function generateProfile(answers){
  const g=GM[answers[5]]||{};
  const prompt=`You are Jeremy Larochelle — sonic branding strategist, 6+ years at Virgin Voyages, helped win Rolling Stone Best Cruise for Music Fans 2025. You owned the sonic identity for Virgin Voyages.\n\nWrite a sonic branding Opening Bar profile. Confident, expert, occasionally poetic. Never generic.\n\nFIXED DATA:\n- Archetype: ${g.archetype}\n- Genre: ${g.genre}\n- Energy: ${g.energy} · ${g.vibe}\n- Instruments: ${g.instruments}\n- Anchor Artists: ${g.artists.join(", ")}\n- Brand Signal: ${g.brandSignal}\n\nMODIFIER DATA:\n- Personality: ${answers[1]} → ${PM[answers[1]]}\n- Audience: ${answers[2]} → ${AM[answers[2]]}\n- Emotion: ${answers[3]} → ${EM[answers[3]]}\n- Music Job: ${answers[4]} → ${DM[answers[4]]}\n- Brand Stage: ${answers[6]} → ${SM[answers[6]]}\n\nReturn ONLY valid JSON:\n{"archetype":"${g.archetype}","tagline":"<punchy one-liner under 10 words>","genreDirection":"${g.genre}","energy":"${g.energy} · ${g.vibe}","instruments":"${g.instruments}","anchorArtists":"${g.artists.join(", ")}","emotionalCore":"<2-3 sentences>","placementStrategy":"<2-3 sentences>","audienceFit":"<2 sentences>","brandStageNote":"<1-2 sentences>","nextStep":"<1 CTA with Jeremy Larochelle by name>"}`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  const text=data.content.map(i=>i.text||"").join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

const FB=(answers)=>{const g=GM[answers[5]]||GM.classicrock;return{archetype:g.archetype,tagline:"Sound that moves people before a word is spoken.",genreDirection:g.genre,energy:`${g.energy} · ${g.vibe}`,instruments:g.instruments,anchorArtists:g.artists.join(", "),emotionalCore:"Your brand demands to be felt before it's understood. The sound arrives with intention — familiar enough to trust, distinctive enough to remember.",placementStrategy:"Deploy strategically across every brand touchpoint — from the first note a customer hears to the last impression they carry out the door.",audienceFit:"This sound speaks directly to your audience's values and aspirations. It earns trust through feel, not trend.",brandStageNote:SM[answers[6]]||SM.established,nextStep:"Work with Jeremy Larochelle to build your complete Sonic Identity and own every room before you say a word."};};

const S={page:{minHeight:"100vh",background:"#060200",fontFamily:"'Georgia','Times New Roman',serif",color:"#e8d5b0",position:"relative"},wrap:{position:"relative",zIndex:1,maxWidth:"740px",margin:"0 auto",padding:"0 0 80px"},card:{background:"linear-gradient(155deg,#150900f2,#0c0500f2)",border:"1px solid #2a1608",borderRadius:"2px",padding:"40px 36px",margin:"0 20px",boxShadow:"0 24px 80px #000000bb,inset 0 1px 0 #3a2008"},label:{margin:"0 0 8px",fontSize:"11px",letterSpacing:".3em",color:"#6a4020",textTransform:"uppercase",fontWeight:"bold"},value:{margin:0,fontSize:"18px",color:"#c8a060",lineHeight:1.6,fontWeight:"bold"},body:{margin:0,fontSize:"17px",color:"#c8b890",lineHeight:1.9},divider:{width:"100%",height:"52px",backgroundImage:`url(${IMG.waveformDivider})`,backgroundSize:"cover",backgroundPosition:"center",opacity:.5,borderRadius:"2px",margin:"24px 0"},btn:{background:"linear-gradient(135deg,#c8860a,#9a6208)",border:"none",borderRadius:"1px",padding:"20px 52px",color:"#060200",fontSize:"15px",letterSpacing:".2em",textTransform:"uppercase",fontFamily:"'Georgia',serif",fontWeight:"900",cursor:"pointer",transition:"all .2s ease"},sep:{borderBottom:"1px solid #1e0a02",marginBottom:"28px",paddingBottom:"28px"}};

const Vinyl=({size=180,speed="14s"})=>(<div style={{width:size,height:size,borderRadius:"50%",overflow:"hidden",animation:`spin ${speed} linear infinite`,boxShadow:"0 0 56px #c8860a44",flexShrink:0}}><img src={IMG.vinylRecord} alt="vinyl" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} onError={e=>{e.target.style.display="none";e.target.parentNode.style.background="#1a0a00";e.target.parentNode.innerHTML='<svg viewBox="0 0 200 200" style="width:100%;height:100%"><circle cx="100" cy="100" r="98" fill="#111"/><circle cx="100" cy="100" r="60" fill="none" stroke="#222" stroke-width="2"/><circle cx="100" cy="100" r="18" fill="#1a0800"/><circle cx="100" cy="100" r="7" fill="#c8860a"/></svg>';}}/></div>);
const Hero=({height=420,children})=>(<div style={{position:"relative",height,overflow:"hidden",backgroundImage:`url(${IMG.heroBg})`,backgroundSize:"cover",backgroundPosition:"center top"}}><div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,#06020077 0%,#060200 100%)"}}/>{children}</div>);
const Wave=({opacity=.65,height=64})=>(<div style={{height,background:"#1a0800",backgroundImage:`url(${IMG.headerBg})`,backgroundSize:"cover",backgroundPosition:"center",opacity}}/>);
const Bar=({current,total})=>(<div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>{Array.from({length:total}).map((_,i)=>(<div key={i} style={{height:"4px",flex:1,background:i<current?"#c8860a":"#1c0900",borderRadius:"2px",transition:"background .4s"}}/>))}</div>);

function App(){
  const[step,setStep]=useState("intro");
  const[qIdx,setQIdx]=useState(0);
  const[answers,setAnswers]=useState({});
  const[sel,setSel]=useState(null);
  const[profile,setProfile]=useState(null);
  const[email,setEmail]=useState("");
  const[name,setName]=useState("");
  const[done,setDone]=useState(false);
  const[anim,setAnim]=useState(true);
  const go=next=>{setAnim(false);setTimeout(()=>{setStep(next);setAnim(true);},280);};
  const pick=async val=>{setSel(val);const qId=QUESTIONS[qIdx].id;const na={...answers,[qId]:val};setAnswers(na);setTimeout(async()=>{if(qIdx<QUESTIONS.length-1){setAnim(false);setTimeout(()=>{setQIdx(qIdx+1);setSel(null);setAnim(true);},280);}else{go("loading");try{const r=await generateProfile(na);setProfile(r);go("result");}catch{setProfile(FB(na));go("result");}}},380);};
  const fw={...S.wrap,opacity:anim?1:0,transform:anim?"translateY(0)":"translateY(10px)",transition:"opacity .28s ease,transform .28s ease"};

  if(step==="intro")return(<div style={S.page}><Hero><div style={{position:"absolute",bottom:"32px",width:"100%",textAlign:"center",padding:"0 20px"}}><p style={{margin:0,fontSize:"13px",letterSpacing:".4em",color:"#c8860a",textTransform:"uppercase",fontWeight:"bold"}}>Jeremy Larochelle</p><h1 style={{margin:"12px 0 0",fontSize:"clamp(36px,8vw,64px)",fontStyle:"italic",fontWeight:"900",color:"#e8d5b0",lineHeight:1.0,textShadow:"0 2px 40px #00000099"}}>Find Your<br/>Sonic Identity</h1></div></Hero><Wave/><div style={fw}><div style={{display:"flex",justifyContent:"center",margin:"36px 0 32px"}}><Vinyl/></div><div style={{...S.card,textAlign:"center"}}><p style={{fontSize:"18px",color:"#c8b890",lineHeight:1.9,margin:"0 0 28px",fontStyle:"italic"}}>Sound shapes how people feel about your brand before a single word lands. Jeremy Larochelle owned the sonic identity for Virgin Voyages — the cruise line Rolling Stone named <span style={{color:"#c8860a",fontWeight:"bold"}}>Best for Music Fans in 2025.</span><br/>Now it's your brand's turn.</p><div style={S.divider}/><p style={{fontSize:"13px",letterSpacing:".18em",color:"#6a4020",margin:"0 0 32px",textTransform:"uppercase",fontWeight:"bold"}}>6 Questions · One Sonic Archetype · Zero Guesswork</p><button className="mb" style={S.btn} onClick={()=>go("quiz")}>🤘 Begin the Assessment</button></div></div></div>);

  if(step==="quiz"){const q=QUESTIONS[qIdx];return(<div style={S.page}><Hero height={110}><div style={{position:"absolute",bottom:"14px",left:0,right:0,textAlign:"center"}}><p style={{margin:0,fontSize:"11px",letterSpacing:".4em",color:"#c8860a",textTransform:"uppercase",fontWeight:"bold"}}>Sonic Brand Assessment</p></div></Hero><div style={fw}><div style={{padding:"28px 20px 0"}}><Bar current={qIdx+1} total={QUESTIONS.length}/><p style={{textAlign:"right",fontSize:"13px",color:"#6a4020",margin:"0 0 20px",fontWeight:"bold"}}>Question {qIdx+1} of {QUESTIONS.length}</p></div><div style={S.card}><p style={{fontSize:"clamp(20px,4vw,26px)",fontStyle:"italic",fontWeight:"bold",color:"#e8d5b0",textAlign:"center",margin:"0 0 32px",lineHeight:1.4}}>{q.question}</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>{q.options.map(opt=>(<button key={opt.value} className="ob" style={{background:sel===opt.value?"#200d00":"#0c0500",border:`2px solid ${sel===opt.value?"#c8860a":"#251407"}`,borderRadius:"2px",padding:"20px 18px",cursor:"pointer",transition:"all .2s",textAlign:"left",color:sel===opt.value?"#c8860a":"#a08060",display:"flex",flexDirection:"column",gap:"6px"}} onClick={()=>pick(opt.value)}><span style={{fontSize:"17px",fontFamily:"'Georgia',serif",fontWeight:"bold"}}>{opt.label}</span>{opt.sub&&<span style={{fontSize:"14px",color:sel===opt.value?"#c8a060":"#8a6840",fontStyle:"italic",fontWeight:"600"}}>{opt.sub}</span>}</button>))}</div></div><div style={{...S.divider,margin:"28px 20px 0"}}/></div></div>);}

  if(step==="loading")return(<div style={{...S.page,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><Vinyl size={190} speed="3s"/><p style={{marginTop:"36px",fontSize:"15px",letterSpacing:".3em",color:"#c8860a",textTransform:"uppercase",fontWeight:"bold",animation:"pulse 1.8s ease infinite"}}>Building Your Opening Bar...</p></div>);

  if(step==="result"&&profile)return(<div style={S.page}><div style={{position:"fixed",inset:0,zIndex:0,backgroundImage:`url(${IMG.resultBg})`,backgroundSize:"cover",backgroundPosition:"center",opacity:.1}}/><div style={{position:"relative",zIndex:1,height:"72px",background:"#1a0800",backgroundImage:`url(${IMG.headerBg})`,backgroundSize:"cover",backgroundPosition:"center",opacity:.85}}><div style={{position:"absolute",inset:0,background:"#06020055"}}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{margin:0,fontSize:"11px",letterSpacing:".4em",color:"#c8860a",textTransform:"uppercase",fontWeight:"bold",position:"relative",zIndex:1}}>Jeremy Larochelle · Sonic Identity Framework</p></div></div><div style={{...fw,zIndex:1}}><div style={{textAlign:"center",padding:"40px 20px 0"}}><p style={{margin:"0 0 4px",fontSize:"11px",letterSpacing:".4em",color:"#6a4020",textTransform:"uppercase",fontWeight:"bold"}}>Your Sonic Identity</p><p style={{margin:"0 0 12px",fontSize:"16px",fontStyle:"italic",fontWeight:"600",color:"#8a7055"}}>Opening Bar</p><h2 style={{margin:"0 0 16px",fontSize:"clamp(36px,8vw,62px)",fontStyle:"italic",fontWeight:"900",color:"#e8d5b0",textShadow:"0 0 50px #c8860a66",lineHeight:1.05}}>{profile.archetype}</h2><p style={{margin:"0 0 28px",fontSize:"17px",color:"#c8860a",fontStyle:"italic",fontWeight:"bold"}}>"{profile.tagline}"</p><div style={{background:"#0d0600",border:"1px solid #2a1208",borderRadius:"2px",padding:"20px 28px",margin:"0 0 8px",textAlign:"left"}}><p style={{margin:"0 0 6px",fontSize:"11px",letterSpacing:".3em",color:"#c8860a",textTransform:"uppercase",fontWeight:"bold"}}>A Note on This Profile</p><p style={{margin:0,fontSize:"15px",color:"#8a7055",lineHeight:1.8,fontStyle:"italic"}}>This profile was built using Jeremy Larochelle's proprietary Sonic Identity frameworks. Consider this your Opening Bar — the first notes of a larger composition. Your full Sonic Identity strategy requires time, conversation, and creative collaboration with Jeremy directly.</p></div></div><div style={{...S.divider,margin:"28px 20px"}}/><div style={S.card}><div style={{...S.sep,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"28px"}}><div><p style={S.label}>Genre Direction</p><p style={S.value}>{profile.genreDirection}</p></div><div><p style={S.label}>Energy Level</p><p style={S.value}>{profile.energy}</p></div></div><div style={{...S.sep,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"28px"}}><div><p style={S.label}>Core Instruments</p><p style={S.value}>{profile.instruments}</p></div><div><p style={S.label}>Anchor Artists</p><div style={{display:"flex",flexDirection:"column",gap:"4px",marginTop:"4px"}}>{profile.anchorArtists.split(", ").map(a=>(<p key={a} style={{margin:0,fontSize:"16px",color:"#c8a060",fontWeight:"bold",lineHeight:1.5}}>— {a}</p>))}</div></div></div><div style={S.sep}><p style={S.label}>Emotional Core</p><p style={S.body}>{profile.emotionalCore}</p></div><div style={S.sep}><p style={S.label}>Placement Strategy</p><p style={S.body}>{profile.placementStrategy}</p></div><div style={S.sep}><p style={S.label}>Audience Fit</p><p style={S.body}>{profile.audienceFit}</p></div><div style={{background:"#0a0400",border:"1px solid #2a1208",borderRadius:"2px",padding:"20px 24px"}}><p style={{...S.label,color:"#c8860a"}}>Strategic Note</p><p style={{...S.body,fontStyle:"italic",color:"#c8a06099"}}>{profile.brandStageNote}</p></div></div><div style={{...S.card,marginTop:"24px",borderColor:"#3a1e08"}}>{!done?(<><h3 style={{margin:"0 0 10px",fontSize:"26px",fontStyle:"italic",fontWeight:"900",color:"#e8d5b0"}}>Ready to write the full score?</h3><p style={{margin:"0 0 24px",fontSize:"17px",color:"#a08060",lineHeight:1.75}}>{profile.nextStep}</p><div style={S.divider}/>{[{ph:"Your Name",val:name,set:setName,type:"text"},{ph:"Your Email",val:email,set:setEmail,type:"email"}].map(f=>(<input key={f.ph} type={f.type} placeholder={f.ph} value={f.val} onChange={
